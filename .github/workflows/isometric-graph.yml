name: Generate Isometric Contribution Graph

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev

      - name: Install dependencies
        run: |
          cd scripts/isometric-generator
          npm install-scripts approve canvas || true
          npm install
          npm rebuild canvas

      - name: Generate isometric graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd scripts/isometric-generator
          node generate.js ${{ github.repository_owner }} none ../../isometric-profile.png --theme light --stats --credit

      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add isometric-profile.png
          if git commit -m "⚡ Generated 3D Isometric Contribution Graph"; then git push; fi
