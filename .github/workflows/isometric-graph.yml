name: Generate Isometric Contribution Graph

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repo
        uses: actions/checkout@v4

      - name: Clone isometric generator tool
        run: git clone https://github.com/Spectrewolf8/isometric-contributions-embeds.git generator-tool

      - name: Install dependencies
        run: |
          cd generator-tool
          npm install

      - name: Generate isometric graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd generator-tool
          npm run generate -- ${{ github.repository_owner }} none ../isometric-profile.png --theme light --stats --credit

      - name: Commit and Push
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add isometric-profile.png
          if git commit -m "⚡ Generated 3D Isometric Contribution Graph"; then git push; fi
