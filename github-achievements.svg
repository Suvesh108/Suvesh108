<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 130" width="100%" height="100%">
  
  <defs>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer glowing border and background -->
  <rect width="976" height="126" x="2" y="2" fill="#0b0f19" rx="8" stroke="#10b981" stroke-width="1.2" filter="url(#neonGlow)" />
  <rect width="976" height="126" x="2" y="2" fill="#0b0f19" rx="8" stroke="#1e293b" stroke-width="1" />
  
  <text x="20" y="25" font-family="Segoe UI, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#10b981" letter-spacing="1">🏆 TROPHY CABINET &amp; ACHIEVEMENTS</text>
  
  
    <!-- Badge 1 -->
    <g transform="translate(20, 45)">
      <!-- Pill Container with neon glow border -->
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="1" filter="url(#neonGlow)" />
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#1e293b" stroke-width="1" />
      <text x="15" y="38" font-size="24">🚀</text>
      <text x="55" y="25" font-family="Segoe UI, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Code Specialist</text>
      <text x="55" y="43" font-family="Segoe UI, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">111+ Commits</text>
    </g>
    <!-- Badge 2 -->
    <g transform="translate(258, 45)">
      <!-- Pill Container with neon glow border -->
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="1" filter="url(#neonGlow)" />
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#1e293b" stroke-width="1" />
      <text x="15" y="38" font-size="24">🛠️</text>
      <text x="55" y="25" font-family="Segoe UI, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Active Builder</text>
      <text x="55" y="43" font-family="Segoe UI, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">Shipping projects</text>
    </g>
    <!-- Badge 3 -->
    <g transform="translate(496, 45)">
      <!-- Pill Container with neon glow border -->
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="1" filter="url(#neonGlow)" />
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#1e293b" stroke-width="1" />
      <text x="15" y="38" font-size="24">📣</text>
      <text x="55" y="25" font-family="Segoe UI, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Networker</text>
      <text x="55" y="43" font-family="Segoe UI, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">Growing connection</text>
    </g>
    <!-- Badge 4 -->
    <g transform="translate(734, 45)">
      <!-- Pill Container with neon glow border -->
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#10b981" stroke-width="1" filter="url(#neonGlow)" />
      <rect width="222" height="60" fill="#0f172a" rx="8" stroke="#1e293b" stroke-width="1" />
      <text x="15" y="38" font-size="24">📦</text>
      <text x="55" y="25" font-family="Segoe UI, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#10b981">Library Manager</text>
      <text x="55" y="43" font-family="Segoe UI, -apple-system, sans-serif" font-size="11" fill="#cbd5e1">18 Repos</text>
    </g>
</svg>